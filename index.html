<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Fitness Exercise Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Exercise Muscle Finder</h1>

<div class="search-box">
<input type="text" id="exerciseInput" placeholder="Enter exercise (e.g. dumbbell press)">
<button onclick="searchExercise()">Search</button>
<button onclick="startVoice()">🎤 Voice</button>
</div>

<h2 id="exerciseTitle"></h2>

<div class="container">

<div class="body-diagram">

<svg viewBox="0 0 200 400">

<rect x="90" y="20" width="20" height="40" fill="#ccc"/>

<rect id="chest" x="70" y="80" width="60" height="40" fill="#ccc"/>

<rect id="biceps" x="40" y="90" width="20" height="50" fill="#ccc"/>
<rect x="140" y="90" width="20" height="50" fill="#ccc"/>

<rect id="abs" x="80" y="120" width="40" height="60" fill="#ccc"/>

<rect id="legs" x="80" y="200" width="15" height="100" fill="#ccc"/>
<rect x="105" y="200" width="15" height="100" fill="#ccc"/>

</svg>

</div>

<div class="exercise-demo">
<img id="exerciseGif" src="">
<p id="muscleName"></p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
